<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETFLIX</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>NETFLIX</h1>
        <button id="theme-toggle" aria-label="Alternar modo escuro/claro">🌙</button>
    </header>
    <main>
        <p>Escolha seu perfil abaixo para acessar o catálogo.</p>

        <section class="profiles" aria-labelledby="profiles-heading">
            <h2 id="profiles-heading">Quem está assistindo?</h2>
            <ul class="profiles-list">
                <li>
                    <ol class="profiles-ordered">
                        <li class="profile">
                            <button type="button" class="profile-btn" aria-label="Selecionar perfil Maria">
                                <figure>
                                    <img src="assets/perfil-1.jpeg" alt="Foto do perfil de Maria">
                                    <figcaption>João</figcaption>
                                </figure>
                            </button>
                        </li>
                        <li class="profile">
                            <button type="button" class="profile-btn" aria-label="Selecionar perfil João">
                                <figure>
                                    <img src="assets/perfil-2.jpeg" alt="Foto do perfil de João">
                                    <figcaption>Maria</figcaption>
                                </figure>
                            </button>
                        </li>
                        <li class="profile">
                            <button type="button" class="profile-btn" aria-label="Selecionar perfil Pedro">
                                <figure>
                                    <img src="assets/perfil-3.jpeg" alt="Foto do perfil de Pedro">
                                    <figcaption>Pedro</figcaption>
                                </figure>
                            </button>
                        </li>
                        <li class="profile">
                            <button type="button" class="profile-btn" aria-label="Selecionar perfil Ana">
                                <figure>
                                    <img src="assets/perfil-4.jpeg" alt="Foto do perfil de Ana">
                                    <figcaption>Ana</figcaption>
                                </figure>
                            </button>
                        </li>
                    </ol>
                </li>
            </ul>
            <button id="manage-profiles" class="manage-btn" aria-label="Gerenciar perfis">Gerenciar Perfis</button>
        </section>
    </main>
    <footer>
        <p>© Netflix</p>
    </footer>
</body>
</html>
